<title>Synapse — Vault Graph</title>
<style>
/* ============================================================
   SYNAPSE — vault graph explorer
   Palette (dark "observatory" first):
     abyss     #0b1017  ground
     slate     #121a24  raised surface
     starlight #dde6ef  primary text
     fog       #8296a9  muted text
     signal    #e5aa42  amber accent
     paper     #eceef1  light ground
   Type:
     serif  — Iowan Old Style / Palatino  (note titles, prose)
     ui     — Avenir Next / Segoe UI      (chrome)
     mono   — ui-monospace                (data, dates, tags)
   ============================================================ */
:root{
  --font-serif:"Iowan Old Style","Palatino Linotype","Book Antiqua",Palatino,Georgia,serif;
  --font-ui:"Avenir Next",Avenir,"Segoe UI Variable Text","Segoe UI",system-ui,sans-serif;
  --font-mono:ui-monospace,"SF Mono","Cascadia Mono",Menlo,Consolas,"Liberation Mono",monospace;

  --bg:#eceef1; --bg2:#f7f8fa; --bg3:#e1e5ea; --line:#c8cfd7;
  --text:#1b2530; --text2:#5d6c7b; --accent:#9c6712; --accent-soft:rgba(156,103,18,.14);
  --edge:#94a1ad; --speck:#c3cbd3; --bar:rgba(247,248,250,.86);
  --shadow:0 8px 28px rgba(23,33,43,.16);
  --cl0:#2f6fc0; --cl1:#a97a12; --cl2:#7350c8; --cl3:#14897a;
  --cl4:#4e8a23; --cl5:#c04a55; --cl6:#b04890;
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#0b1017; --bg2:#121a24; --bg3:#1b2634; --line:#26333f;
    --text:#dde6ef; --text2:#8296a9; --accent:#e5aa42; --accent-soft:rgba(229,170,66,.16);
    --edge:#3d4c5c; --speck:#2c3947; --bar:rgba(13,19,27,.82);
    --shadow:0 10px 34px rgba(0,0,0,.5);
    --cl0:#5b9ce6; --cl1:#e3a83e; --cl2:#9d7ce8; --cl3:#3fbfa9;
    --cl4:#84bd55; --cl5:#e06c75; --cl6:#d879b8;
  }
}
:root[data-theme="dark"]{
  --bg:#0b1017; --bg2:#121a24; --bg3:#1b2634; --line:#26333f;
  --text:#dde6ef; --text2:#8296a9; --accent:#e5aa42; --accent-soft:rgba(229,170,66,.16);
  --edge:#3d4c5c; --speck:#2c3947; --bar:rgba(13,19,27,.82);
  --shadow:0 10px 34px rgba(0,0,0,.5);
  --cl0:#5b9ce6; --cl1:#e3a83e; --cl2:#9d7ce8; --cl3:#3fbfa9;
  --cl4:#84bd55; --cl5:#e06c75; --cl6:#d879b8;
}
:root[data-theme="light"]{
  --bg:#eceef1; --bg2:#f7f8fa; --bg3:#e1e5ea; --line:#c8cfd7;
  --text:#1b2530; --text2:#5d6c7b; --accent:#9c6712; --accent-soft:rgba(156,103,18,.14);
  --edge:#94a1ad; --speck:#c3cbd3; --bar:rgba(247,248,250,.86);
  --shadow:0 8px 28px rgba(23,33,43,.16);
  --cl0:#2f6fc0; --cl1:#a97a12; --cl2:#7350c8; --cl3:#14897a;
  --cl4:#4e8a23; --cl5:#c04a55; --cl6:#b04890;
}

html,body{height:100%;}
body{
  margin:0; overflow:hidden; background:var(--bg); color:var(--text);
  font-family:var(--font-ui); font-size:14px; line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
*,*::before,*::after{box-sizing:border-box;}
:focus{outline:none;}
:focus-visible{outline:2px solid var(--accent); outline-offset:2px; border-radius:2px;}
button{font:inherit; color:inherit; cursor:pointer;}

#stage{position:fixed; inset:0; display:block; touch-action:none; cursor:grab;}
#stage.dragging{cursor:grabbing;}
#stage.overnode{cursor:pointer;}

/* ---------- top bar ---------- */
.topbar{
  position:fixed; top:0; left:0; right:0; z-index:20;
  display:flex; align-items:center; gap:14px; padding:8px 14px;
  background:var(--bar); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
}
.brand{display:flex; align-items:baseline; gap:9px; flex:none;}
.brand svg{width:17px; height:17px; transform:translateY(2px); flex:none;}
.brand .word{
  font-family:var(--font-mono); font-size:13px; font-weight:700;
  letter-spacing:.22em; color:var(--text);
}
.brand .sub{font-family:var(--font-mono); font-size:10.5px; letter-spacing:.08em; color:var(--text2);}
@media (max-width:860px){ .brand .sub{display:none;} }

.searchwrap{position:relative; flex:1 1 auto; max-width:380px; min-width:130px;}
#q{
  width:100%; padding:6px 10px 6px 28px;
  font-family:var(--font-mono); font-size:12.5px;
  color:var(--text); background:var(--bg3);
  border:1px solid var(--line); border-radius:3px;
}
#q::placeholder{color:var(--text2);}
#q:focus-visible{outline:2px solid var(--accent); outline-offset:1px;}
.searchwrap .lens{
  position:absolute; left:9px; top:50%; transform:translateY(-50%);
  width:12px; height:12px; pointer-events:none; color:var(--text2);
}
#results{
  position:absolute; top:calc(100% + 6px); left:0; right:0; z-index:30;
  background:var(--bg2); border:1px solid var(--line); border-radius:4px;
  box-shadow:var(--shadow); max-height:320px; overflow-y:auto;
  display:none; padding:4px;
}
#results.open{display:block;}
.res{
  display:flex; align-items:center; gap:8px; width:100%;
  padding:6px 8px; border:0; background:none; text-align:left; border-radius:3px;
}
.res .dot{width:8px; height:8px; border-radius:2px; flex:none;}
.res .rt{font-family:var(--font-serif); font-size:14px; color:var(--text); flex:1 1 auto; min-width:0;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.res .rt b{color:var(--accent); font-weight:700;}
.res .rc{font-family:var(--font-mono); font-size:10px; color:var(--text2); flex:none; letter-spacing:.04em;}
.res:hover,.res.active{background:var(--bg3);}
.res.none{color:var(--text2); font-family:var(--font-mono); font-size:11.5px; cursor:default;}
.res.none:hover{background:none;}

.controls{display:flex; align-items:center; gap:8px; margin-left:auto; flex:none;}
.btn{
  padding:5px 11px; border:1px solid var(--line); border-radius:3px;
  background:transparent; color:var(--text2);
  font-family:var(--font-mono); font-size:10.5px; letter-spacing:.12em; text-transform:uppercase;
  transition:color .15s, border-color .15s, background .15s;
}
.btn:hover{color:var(--text); border-color:var(--text2);}
.btn[aria-pressed="true"]{color:var(--accent); border-color:var(--accent); background:var(--accent-soft);}
#btnExit{display:none; color:var(--accent); border-color:var(--accent);}
#btnExit.show{display:inline-block;}
#modeChip{
  display:none; font-family:var(--font-mono); font-size:10.5px; color:var(--text2);
  letter-spacing:.04em; max-width:220px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
#modeChip.show{display:inline-block;}
@media (max-width:720px){ #modeChip{display:none !important;} }

/* ---------- bottom stats strip ---------- */
.statsbar{
  position:fixed; left:0; right:0; bottom:0; z-index:20;
  display:flex; align-items:center; flex-wrap:wrap; gap:6px 18px; padding:7px 14px;
  background:var(--bar); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
  border-top:1px solid var(--line);
  font-family:var(--font-mono); font-size:11px; color:var(--text2);
  font-variant-numeric:tabular-nums;
}
.stat b{color:var(--text); font-weight:700; margin-right:4px;}
.hubs{display:flex; align-items:center; gap:6px; flex-wrap:wrap;}
.hubs .lbl{letter-spacing:.1em; text-transform:uppercase; font-size:9.5px;}
.hub{
  border:1px solid var(--line); background:none; border-radius:3px;
  padding:2px 8px; font-family:var(--font-mono); font-size:10.5px; color:var(--text2);
  display:inline-flex; align-items:center; gap:6px;
}
.hub:hover{color:var(--text); border-color:var(--text2);}
.hub .dot{width:7px; height:7px; border-radius:2px;}
.hub .n{color:var(--text);}
.legend{display:flex; align-items:center; gap:4px; flex-wrap:wrap;}
.lg{
  border:1px solid transparent; background:none; border-radius:3px;
  padding:2px 7px; font-family:var(--font-mono); font-size:10px; color:var(--text2);
  display:inline-flex; align-items:center; gap:6px; letter-spacing:.03em;
}
.lg .sw{width:8px; height:8px; border-radius:2px;}
.lg:hover{color:var(--text);}
.lg[aria-pressed="true"]{border-color:var(--line); background:var(--bg3); color:var(--text);}
.hint{margin-left:auto; font-size:10px; letter-spacing:.03em;}
@media (max-width:1100px){ .hint{display:none;} }
@media (max-width:820px){ .hubs{display:none;} }

/* ---------- note panel ---------- */
#panel{
  position:fixed; z-index:25; top:58px; bottom:50px; right:12px;
  width:min(420px, calc(100vw - 24px));
  background:var(--bg2); border:1px solid var(--line); border-radius:4px;
  box-shadow:var(--shadow);
  transform:translateX(calc(100% + 24px)); transition:transform .26s cubic-bezier(.2,.8,.25,1);
  display:flex; flex-direction:column;
}
#panel.open{transform:translateX(0);}
.phead{
  display:flex; align-items:flex-start; gap:10px; padding:14px 16px 0 16px; flex:none;
}
.phead .meta{flex:1 1 auto; min-width:0;}
.pcluster{
  font-family:var(--font-mono); font-size:10px; letter-spacing:.14em; text-transform:uppercase;
  display:flex; align-items:center; gap:7px; color:var(--text2);
}
.pcluster .dot{width:8px; height:8px; border-radius:2px; flex:none;}
.ptitle{
  font-family:var(--font-serif); font-size:22px; line-height:1.22; font-weight:600;
  margin:6px 0 0 0; text-wrap:balance; color:var(--text);
}
#pClose{
  flex:none; width:26px; height:26px; border:1px solid var(--line); border-radius:3px;
  background:none; color:var(--text2); font-size:14px; line-height:1;
  display:grid; place-items:center;
}
#pClose:hover{color:var(--text); border-color:var(--text2);}
.pbody{overflow-y:auto; padding:12px 16px 20px 16px; overscroll-behavior:contain;}
.fm{
  font-family:var(--font-mono); font-size:11px; color:var(--text2);
  border:1px solid var(--line); border-radius:3px; background:var(--bg);
  padding:9px 11px; margin:12px 0 4px 0; display:grid; grid-template-columns:auto 1fr; gap:3px 14px;
  font-variant-numeric:tabular-nums;
}
.fm .k{color:var(--text2);}
.fm .v{color:var(--text);}
.tags{display:flex; flex-wrap:wrap; gap:5px;}
.tag{font-family:var(--font-mono); font-size:10.5px; color:var(--accent);}
.prose{font-family:var(--font-serif); font-size:15px; line-height:1.68; color:var(--text);}
.prose p{margin:13px 0;}
.wl{
  color:var(--accent); cursor:pointer; border-bottom:1px dashed var(--accent);
  border-radius:1px;
}
.wl:hover{border-bottom-style:solid; background:var(--accent-soft);}
.sect{
  margin-top:20px; padding-top:12px; border-top:1px solid var(--line);
}
.sect h3{
  margin:0 0 8px 0; font-family:var(--font-mono); font-size:10px; font-weight:700;
  letter-spacing:.16em; text-transform:uppercase; color:var(--text2);
}
.lnk{
  display:flex; align-items:baseline; gap:8px; width:100%; text-align:left;
  background:none; border:0; border-radius:3px; padding:5px 6px; margin:0 -6px;
}
.lnk:hover{background:var(--bg3);}
.lnk .dot{width:7px; height:7px; border-radius:2px; flex:none; transform:translateY(-1px);}
.lnk .lt{font-family:var(--font-serif); font-size:14px; color:var(--text);}
.bl{display:block; width:100%; text-align:left; background:none; border:0; border-radius:3px;
  padding:7px 6px; margin:0 -6px;}
.bl:hover{background:var(--bg3);}
.bl .row{display:flex; align-items:baseline; gap:8px;}
.bl .dot{width:7px; height:7px; border-radius:2px; flex:none; transform:translateY(-1px);}
.bl .lt{font-family:var(--font-serif); font-size:14px; color:var(--text);}
.bl .snip{
  display:block; margin:3px 0 0 15px; font-family:var(--font-serif); font-style:italic;
  font-size:12.5px; line-height:1.5; color:var(--text2);
}
.orphan-note{font-family:var(--font-mono); font-size:11px; color:var(--text2); font-style:normal;}

/* ---------- time-lapse HUD ---------- */
#hud{
  position:fixed; z-index:22; left:50%; bottom:56px; transform:translateX(-50%);
  background:var(--bar); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
  border:1px solid var(--line); border-radius:4px; box-shadow:var(--shadow);
  padding:10px 18px 12px 18px; min-width:280px; text-align:center;
  display:none; font-variant-numeric:tabular-nums;
}
#hud.show{display:block;}
#hudDate{font-family:var(--font-mono); font-size:19px; font-weight:700; color:var(--text); letter-spacing:.04em;}
#hudN{font-family:var(--font-mono); font-size:10.5px; color:var(--text2); letter-spacing:.08em; margin-top:2px;}
#hudBarWrap{height:3px; background:var(--bg3); border-radius:2px; margin-top:9px; overflow:hidden;}
#hudBar{height:100%; width:0%; background:var(--accent); border-radius:2px;}

@media (prefers-reduced-motion: reduce){
  #panel{transition:none;}
  .btn,.res,.lnk,.bl{transition:none;}
}
</style>

  <div class="brand">
    <svg viewBox="0 0 20 20" aria-hidden="true">

<canvas id="stage" role="img" aria-label="Force-directed graph of the note vault. Drag to pan, scroll to zoom, click a note to read it, double-click a note for its local graph."></canvas>

<aside id="panel" aria-label="Note detail">

  <div class="pbody" id="pBody"></div>
</aside>

<div id="hud" aria-live="off">
  <div id="hudDate">—</div>
  <div id="hudN"></div>
  <div id="hudBarWrap"><div id="hudBar"></div></div>
</div>

<footer class="statsbar">
  <span class="stat"><b id="stNotes">0</b>notes</span>
  <span class="stat"><b id="stLinks">0</b>links</span>
  <span class="stat"><b id="stOrphans">0</b>orphans</span>
  <span class="hubs"><span class="lbl">Top hubs</span><span id="hubChips"></span></span>
  <span class="legend" id="legend"></span>
  <span class="hint">drag to pan · scroll to zoom · click a note to read · double-click for local graph · <b>/</b> to search</span>
</footer>

function addLink(a,b){
  if(a===b) return false;
  var key=Math.min(a,b)+":"+Math.max(a,b);
  if(linkKeys.has(key)) return false;
  linkKeys.add(key);
  links.push({s:a,t:b});
  notes[a].out.push(b); notes[b].inl.push(a);
  notes[a].adj.add(b); notes[b].adj.add(a);
  return true;
}
function weightedPick(pool,wfn){
  var tot=0,w=[],i;
  for(i=0;i<pool.length;i++){ w[i]=wfn(pool[i]); tot+=w[i]; }
  var r=rng()*tot;
  for(i=0;i<pool.length;i++){ r-=w[i]; if(r<=0) return pool[i]; }
  return pool[pool.length-1];
}

var ANCHOR_R=640;
var anchors=CL.map(function(_,ci){
  var a=ci/CL.length*Math.PI*2-Math.PI/2;

var alpha=1;
var REP=1300, CUT2=340*340, SPRING=0.035, ANCH=0.009, CENT=0.0016, DAMP=0.8;
function reheat(a){ alpha=Math.max(alpha,a); }

function step(){
  if(alpha<0.003){ alpha=0; return; }
  var act=[],i,j,n,m;
  for(i=0;i<notes.length;i++){ n=notes[i]; n.active=n.visT>0.5; if(n.active) act.push(n); }
  // repulsion
  for(i=0;i<act.length;i++){
    n=act[i];
    for(j=i+1;j<act.length;j++){
      m=act[j];
      var dx=m.x-n.x, dy=m.y-n.y, d2=dx*dx+dy*dy;
      if(d2>CUT2) continue;
      if(d2<25){ dx=(rng()-0.5); dy=(rng()-0.5); d2=25; }
      var d=Math.sqrt(d2), f=REP*alpha/d2, fx=dx/d*f, fy=dy/d*f;
      n.vx-=fx; n.vy-=fy; m.vx+=fx; m.vy+=fy;
    }
  }
  // springs
  for(i=0;i<links.length;i++){
    var L=links[i], a=notes[L.s], b=notes[L.t];
    if(!a.active||!b.active) continue;
    var ddx=b.x-a.x, ddy=b.y-a.y, dd=Math.sqrt(ddx*ddx+ddy*ddy)||1;
    var rest=48+a.r+b.r;
    var ff=(dd-rest)*SPRING*alpha, ux=ddx/dd, uy=ddy/dd;
    a.vx+=ux*ff; a.vy+=uy*ff; b.vx-=ux*ff; b.vy-=uy*ff;
  }
  // anchors + center + integrate
  for(i=0;i<act.length;i++){
    n=act[i];
    var an=anchors[n.ci];
    n.vx+=(an.x-n.x)*ANCH*alpha+(0-n.x)*CENT*alpha;
    n.vy+=(an.y-n.y)*ANCH*alpha+(0-n.y)*CENT*alpha;
    if(dragNode===n) { n.vx=0; n.vy=0; continue; }
    n.vx*=DAMP; n.vy*=DAMP;
    var sp=Math.sqrt(n.vx*n.vx+n.vy*n.vy), cap=40*alpha+2;
    if(sp>cap){ n.vx*=cap/sp; n.vy*=cap/sp; }
    n.x+=n.vx; n.y+=n.vy;
  }
  alpha*=0.986;
}

function RM(){ return matchMedia("(prefers-reduced-motion: reduce)").matches; }
function easeIO(t){ return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2; }
function flyTo(x,y,k,dur){
  camAnim=null;
  if(RM()){ cam.x=x; cam.y=y; cam.k=k; return; }
  camAnim={t0:performance.now(),dur:dur||700,fx:cam.x,fy:cam.y,fk:Math.log(cam.k),tx:x,ty:y,tk:Math.log(k)};
}
function tickCam(now){
  if(!camAnim) return;
  var p=Math.min(1,(now-camAnim.t0)/camAnim.dur), e=easeIO(p);
  cam.x=camAnim.fx+(camAnim.tx-camAnim.fx)*e;
  cam.y=camAnim.fy+(camAnim.ty-camAnim.fy)*e;
  cam.k=Math.exp(camAnim.fk+(camAnim.tk-camAnim.fk)*e);
  if(p>=1) camAnim=null;
}
function fitBounds(list,pad){
  if(!list.length) return;
  var x0=1e9,y0=1e9,x1=-1e9,y1=-1e9;
  list.forEach(function(n){
    x0=Math.min(x0,n.x-n.r); y0=Math.min(y0,n.y-n.r);
    x1=Math.max(x1,n.x+n.r); y1=Math.max(y1,n.y+n.r);
  });
  pad=pad||90;
  var k=Math.min((W-2*pad)/Math.max(60,x1-x0),(H-2*pad)/Math.max(60,y1-y0));
  k=Math.max(0.08,Math.min(1.6,k));
  flyTo((x0+x1)/2,(y0+y1)/2,k);
}

function draw(){
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.fillStyle=TH.bg; ctx.fillRect(0,0,W,H);

  // ambient dust with mild parallax
  var ks=Math.pow(cam.k,0.7);
  ctx.fillStyle=TH.speck; ctx.globalAlpha=0.5;
  for(var i=0;i<specks.length;i++){
    var p=specks[i];
    var px=(p.x-cam.x*0.55)*ks+W/2, py=(p.y-cam.y*0.55)*ks+H/2;
    if(px<-4||px>W+4||py<-4||py>H+4) continue;
    ctx.fillRect(px,py,p.r,p.r);
  }
  ctx.globalAlpha=1;

  var hoverSet=null;
  if(hoverN){ hoverSet=new Set([hoverN.id]); hoverN.adj.forEach(function(a){hoverSet.add(a);}); }

  // edges
  var plainBatch=[];
  for(i=0;i<links.length;i++){
    var L=links[i], a=notes[L.s], b=notes[L.t];
    var va=a.visA*b.visA;
    if(va<0.01) continue;
    var ax=sx(a),ay=sy(a),bx=sx(b),by=sy(b);
    if((ax<0&&bx<0)||(ax>W&&bx>W)||(ay<0&&by<0)||(ay>H&&by>H)) continue;
    var col=TH.edge, ga=0.5*va, lw=1, special=false;
    if(emph.size&&!(emph.has(a.ci)&&emph.has(b.ci))){ ga*=0.14; special=true; }
    if(hoverN){
      if(L.s===hoverN.id||L.t===hoverN.id){ col=TH.cl[hoverN.ci]; ga=0.92*va; lw=1.5; }
      else ga*=0.1;
      special=true;
    } else if(selected&&(L.s===selected.id||L.t===selected.id)){
      col=TH.cl[selected.ci]; ga=0.85*va; lw=1.4; special=true;
    }
    if(!special&&va>0.999){ plainBatch.push(ax,ay,bx,by); continue; }
    ctx.globalAlpha=ga; ctx.strokeStyle=col; ctx.lineWidth=lw;
    ctx.beginPath(); ctx.moveTo(ax,ay); ctx.lineTo(bx,by); ctx.stroke();
  }
  if(plainBatch.length){
    ctx.globalAlpha=0.5; ctx.strokeStyle=TH.edge; ctx.lineWidth=1;
    ctx.beginPath();
    for(i=0;i<plainBatch.length;i+=4){ ctx.moveTo(plainBatch[i],plainBatch[i+1]); ctx.lineTo(plainBatch[i+2],plainBatch[i+3]); }
    ctx.stroke();
  }
  ctx.globalAlpha=1;

  // nodes
  var labels=[];
  for(i=0;i<notes.length;i++){
    var n=notes[i];
    if(n.visA<0.01) continue;
    var nx=sx(n),ny=sy(n),nr=Math.max(1.2,n.r*cam.k);
    if(nx<-40||nx>W+40||ny<-40||ny>H+40) continue;
    var ga2=0.95*n.visA, hot=false;
    if(emph.size&&!emph.has(n.ci)) ga2*=0.15;
    if(hoverSet){ if(hoverSet.has(n.id)){ hot=true; } else ga2*=0.12; }
    if(selected===n) hot=true;
    ctx.globalAlpha=ga2;
    ctx.fillStyle=TH.cl[n.ci];
    ctx.beginPath(); ctx.arc(nx,ny,nr,0,6.2832); ctx.fill();
    ctx.strokeStyle=TH.bg; ctx.lineWidth=1; ctx.stroke();
    if(selected===n){
      ctx.globalAlpha=n.visA; ctx.strokeStyle=TH.accent; ctx.lineWidth=1.6;
      ctx.beginPath(); ctx.arc(nx,ny,nr+3.5,0,6.2832); ctx.stroke();
    } else if(hoverN===n){
      ctx.globalAlpha=n.visA; ctx.strokeStyle=TH.text; ctx.lineWidth=1.2;
      ctx.beginPath(); ctx.arc(nx,ny,nr+3,0,6.2832); ctx.stroke();
    }
    if((hot||(n.r*cam.k>=6.5&&ga2>0.5))&&n.visA>0.6)
      labels.push({n:n,x:nx+nr+5,y:ny,hot:hot});
  }
  // labels
  ctx.globalAlpha=1;
  ctx.font="500 11px "+FONT_UI;
  ctx.textBaseline="middle";
  ctx.lineWidth=3; ctx.strokeStyle=TH.bg; ctx.lineJoin="round";
  for(i=0;i<labels.length;i++){
    var lb=labels[i];
    ctx.globalAlpha=lb.hot?1:0.85;
    ctx.fillStyle=lb.hot?TH.text:TH.text2;
    ctx.strokeText(lb.n.title,lb.x,lb.y);
    ctx.fillText(lb.n.title,lb.x,lb.y);
  }
  ctx.globalAlpha=1;
}

/* ================= panel ================= */
var panel=document.getElementById("panel"), pBody=document.getElementById("pBody"),
    pTitle=document.getElementById("pTitle"), pCl=document.getElementById("pCl"),
    pDot=document.getElementById("pDot");
function el(tag,cls,text){
  var e=document.createElement(tag);
  if(cls) e.className=cls;
  if(text!=null) e.textContent=text;
  return e;
}
function renderProsePara(text){
  var p=el("p");
  var re=/\[\[([^\]]+)\]\]/g, last=0, m;
  while((m=re.exec(text))!==null){
    if(m.index>last) p.appendChild(document.createTextNode(text.slice(last,m.index)));
    var target=byTitle.get(m[1]);
    if(target){
      var s=el("span","wl",m[1]);
      s.setAttribute("role","link"); s.tabIndex=0;
      (function(t){
        s.addEventListener("click",function(){ navTo(t); });
        s.addEventListener("keydown",function(ev){ if(ev.key==="Enter"||ev.key===" "){ ev.preventDefault(); navTo(t); } });
      })(target);
      p.appendChild(s);
    } else p.appendChild(document.createTextNode(m[1]));
    last=re.lastIndex;
  }
  if(last<text.length) p.appendChild(document.createTextNode(text.slice(last)));
  return p;
}
function snippetFor(source,targetTitle){
  var token="[["+targetTitle+"]]";
  for(var i=0;i<source.prose.length;i++){
    var para=source.prose[i], idx=para.indexOf(token);
    if(idx<0) continue;
    var start=para.lastIndexOf(". ",idx); start=start<0?0:start+2;
    var end=para.indexOf(".",idx+token.length); end=end<0?para.length:end+1;
    return para.slice(start,end).replace(/\[\[|\]\]/g,"");
  }
  var first=source.prose[0]||"";
  return first.length>120?first.slice(0,117).replace(/\[\[|\]\]/g,"")+"…":first.replace(/\[\[|\]\]/g,"");
}
function noteRow(target,cls,withSnip,source){
  var b=el("button",cls); b.type="button";
  var row=cls==="bl"?el("span","row"):b;
  var dot=el("span","dot"); dot.style.background=TH.cl[target.ci];
  row.appendChild(dot);
  row.appendChild(el("span","lt",target.title));
  if(cls==="bl"){ b.appendChild(row); }
  if(withSnip&&source) b.appendChild(el("span","snip","“"+snippetFor(source,withSnip)+"”"));
  b.addEventListener("click",function(){ navTo(target); });
  return b;
}
function renderPanel(n){
  pDot.style.background=TH.cl[n.ci];
  pCl.textContent=CL[n.ci].name+" · "+MONTHS[n.date.getUTCMonth()]+" "+n.date.getUTCFullYear();
  pTitle.textContent=n.title;
  pBody.textContent="";
  var fm=el("div","fm");
  function kv(k,vNode){
    fm.appendChild(el("span","k",k));
    if(typeof vNode==="string") fm.appendChild(el("span","v",vNode));
    else { vNode.classList.add("v"); fm.appendChild(vNode); }
  }
  kv("created:",n.created);
  kv("updated:",n.updated);
  kv("status:",n.status);
  var tw=el("span","tags");
  n.tags.forEach(function(t){ tw.appendChild(el("span","tag","#"+t)); });
  kv("tags:",tw);
  kv("links:",String(n.out.length)+" out · "+String(n.inl.length)+" in");
  pBody.appendChild(fm);

  var prose=el("div","prose");
  n.prose.forEach(function(p){ prose.appendChild(renderProsePara(p)); });
  pBody.appendChild(prose);

  var s1=el("div","sect");
  s1.appendChild(el("h3",null,"Links from this note ("+n.out.length+")"));
  if(n.out.length) n.out.forEach(function(id){ s1.appendChild(noteRow(notes[id],"lnk")); });
  else s1.appendChild(el("p","orphan-note","No outgoing links. This one stands alone — for now."));
  pBody.appendChild(s1);

  var s2=el("div","sect");
  s2.appendChild(el("h3",null,"Backlinks ("+n.inl.length+")"));
  if(n.inl.length) n.inl.forEach(function(id){ s2.appendChild(noteRow(notes[id],"bl",n.title,notes[id])); });
  else s2.appendChild(el("p","orphan-note","Nothing links here yet. An orphan waiting for a thought."));
  pBody.appendChild(s2);
  pBody.scrollTop=0;
}
function openPanel(){ panel.classList.add("open"); }
function closePanel(){ panel.classList.remove("open"); selected=null; }
document.getElementById("pClose").addEventListener("click",closePanel);

function selectNode(n,opts){
  opts=opts||{};
  selected=n;
  renderPanel(n);
  openPanel();
  if(opts.fly) flyTo(n.x,n.y,Math.max(cam.k,0.9));
}
function navTo(n){
  if(tl.on) stopTL();
  if(localFocus&&(!localSet||!localSet.has(n.id))) exitLocal(false);
  selectNode(n,{fly:true});
}
function clearSelection(){ closePanel(); }

/* ================= local graph mode ================= */
var btnExit=document.getElementById("btnExit"), modeChip=document.getElementById("modeChip");
function enterLocal(n){
  if(tl.on) return;
  localFocus=n;
  var set=new Set([n.id]);
  n.adj.forEach(function(a){
    set.add(a);
    notes[a].adj.forEach(function(b){ set.add(b); });
  });
  localSet=set;
  notes.forEach(function(m){ m.visT=set.has(m.id)?1:0; });
  reheat(0.5);
  btnExit.classList.add("show");
  modeChip.textContent="local · "+n.title+" · "+set.size+" notes";
  modeChip.classList.add("show");
  var members=notes.filter(function(m){ return set.has(m.id); });
  fitBounds(members,130);
  selectNode(n);
}
function exitLocal(refit){
  if(!localFocus) return;
  localFocus=null; localSet=null;
  notes.forEach(function(m){ m.visT=1; });
  reheat(0.4);
  btnExit.classList.remove("show");
  modeChip.classList.remove("show");
  if(refit!==false) fitAll();
}
btnExit.addEventListener("click",function(){ exitLocal(); });

/* ================= time-lapse ================= */
var btnTL=document.getElementById("btnTL"), hud=document.getElementById("hud"),
    hudDate=document.getElementById("hudDate"), hudN=document.getElementById("hudN"),
    hudBar=document.getElementById("hudBar");
function startTL(){
  exitLocal(false); clearSelection();
  tl.on=true; tl.t=0; tl.count=0; tl.liveLinks=0; tl.liveOrphans=0;
  notes.forEach(function(n){ n.revealed=false; n.visT=0; n.rdeg=0; });
  btnTL.setAttribute("aria-pressed","true");
  hud.classList.add("show");
  fitAll();
}
function reveal(n){
  n.revealed=true; n.visT=1;
  var anchor=null;
  n.adj.forEach(function(a){ if(!anchor&&notes[a].revealed) anchor=notes[a]; });
  if(anchor){ n.x=anchor.x+(Math.random()-0.5)*70; n.y=anchor.y+(Math.random()-0.5)*70; }
  else { var an=anchors[n.ci]; n.x=an.x+(Math.random()-0.5)*260; n.y=an.y+(Math.random()-0.5)*260; }
  n.vx=0; n.vy=0; n.rdeg=0;
  n.adj.forEach(function(a){
    var m=notes[a];
    if(!m.revealed) return;
    tl.liveLinks++;
    if(m.rdeg===0&&m.adj.size>0) tl.liveOrphans--;
    m.rdeg++; n.rdeg++;
  });
  if(n.rdeg===0) tl.liveOrphans++;
}
function tlFrame(dt){
  tl.t+=dt;
  var target=Math.min(order.length,Math.floor(tl.t/tl.dur*order.length));
  var changed=tl.count<target;
  while(tl.count<target) reveal(order[tl.count++]);
  if(changed){
    var last=order[tl.count-1];
    hudDate.textContent=MONTHS[last.date.getUTCMonth()]+" "+last.date.getUTCFullYear();
    hudN.textContent=tl.count+" / "+order.length+" NOTES";
    hudBar.style.width=(tl.count/order.length*100).toFixed(1)+"%";
    updateStats(tl.count,tl.liveLinks,Math.max(0,tl.liveOrphans));
  }
  reheat(0.24);
  if(tl.count>=order.length) stopTL();
}
function stopTL(){
  if(!tl.on&&notes.every(function(n){return n.revealed;})){ /* already stopped */ }
  tl.on=false;
  notes.forEach(function(n){ if(!n.revealed){ n.revealed=true; n.visT=1; } });
  btnTL.setAttribute("aria-pressed","false");
  hud.classList.remove("show");
  updateStats(notes.length,totalLinks,orphanCount);
  reheat(0.5);
}
btnTL.addEventListener("click",function(){ tl.on?stopTL():startTL(); });

/* ================= stats strip ================= */
var stNotes=document.getElementById("stNotes"), stLinks=document.getElementById("stLinks"),
    stOrphans=document.getElementById("stOrphans");
function updateStats(n,l,o){ stNotes.textContent=n; stLinks.textContent=l; stOrphans.textContent=o; }
updateStats(notes.length,totalLinks,orphanCount);

var hubChips=document.getElementById("hubChips");
topHubs.forEach(function(h){
  var b=el("button","hub"); b.type="button"; b.title=h.title+" — "+h.inl.length+" backlinks";
  var d=el("span","dot"); d.style.background=TH.cl[h.ci]; b.appendChild(d);
  var short=h.title.length>22?h.title.slice(0,20)+"…":h.title;
  b.appendChild(el("span",null,short));
  b.appendChild(el("span","n","×"+h.inl.length));
  b.addEventListener("click",function(){ navTo(h); });
  hubChips.appendChild(b);
});

var legend=document.getElementById("legend");
CL.forEach(function(cl,ci){
  var b=el("button","lg"); b.type="button"; b.setAttribute("aria-pressed","false");
  var sw=el("span","sw"); sw.style.background=TH.cl[ci]; b.appendChild(sw);
  b.appendChild(el("span",null,cl.name));
  b.addEventListener("click",function(){
    if(emph.has(ci)) emph.delete(ci); else emph.add(ci);
    b.setAttribute("aria-pressed",emph.has(ci)?"true":"false");
  });
  legend.appendChild(b);
});
// keep legend/hub dot colors fresh on theme change
new MutationObserver(function(){ repaintDots(); }).observe(document.documentElement,{attributes:true,attributeFilter:["data-theme"]});
matchMedia("(prefers-color-scheme: dark)").addEventListener("change",function(){ setTimeout(repaintDots,10); });
function repaintDots(){
  var lgs=legend.querySelectorAll(".lg .sw");
  lgs.forEach(function(sw,i){ sw.style.background=TH.cl[i]; });
  var hs=hubChips.querySelectorAll(".hub .dot");
  hs.forEach(function(d,i){ d.style.background=TH.cl[topHubs[i].ci]; });
  if(selected) renderPanel(selected);
}

document.getElementById("btnReset").addEventListener("click",function(){
  if(tl.on) stopTL();
  exitLocal(false);
  emph.clear();
  legend.querySelectorAll(".lg").forEach(function(b){ b.setAttribute("aria-pressed","false"); });
  fitAll();
});

/* ================= search ================= */
var q=document.getElementById("q"), results=document.getElementById("results");
var resItems=[], resActive=-1;
function fuzzy(query,title){
  var qq=query.toLowerCase(), t=title.toLowerCase();
  var exact=t.indexOf(qq);
  if(exact>=0){
    var idx=[]; for(var i=0;i<qq.length;i++) idx.push(exact+i);
    return {score:200-exact*2+(exact===0?40:0),idx:idx};
  }
  var ti=0, score=0, prev=-2, out=[];
  for(var ci=0;ci<qq.length;ci++){
    var ch=qq[ci];
    if(ch===" ") continue;
    var j=t.indexOf(ch,ti);
    if(j<0) return null;
    var bonus=(j===prev+1)?8:((j===0||" -–—(/'".indexOf(t[j-1])>=0)?6:1);
    score+=bonus-(j-ti)*0.3;
    out.push(j); prev=j; ti=j+1;
  }
  score+=Math.max(0,20-t.length*0.1);
  return {score:score,idx:out};
}
function closeResults(){
  results.classList.remove("open");
  q.setAttribute("aria-expanded","false");
  resItems=[]; resActive=-1;
}
function renderResults(){
  var query=q.value.trim();
  results.textContent=""; resItems=[]; resActive=-1;
  if(!query){ closeResults(); return; }
  var matches=[];
  for(var i=0;i<notes.length;i++){
    var m=fuzzy(query,notes[i].title);
    if(m) matches.push({n:notes[i],m:m});
  }
  matches.sort(function(a,b){ return b.m.score-a.m.score; });
  matches=matches.slice(0,8);
  if(!matches.length){
    var none=el("div","res none","No notes match “"+query+"”. Try fewer letters — fuzzy match is on.");
    results.appendChild(none);
  } else {
    matches.forEach(function(mm){
      var b=el("button","res"); b.type="button"; b.setAttribute("role","option");
      var d=el("span","dot"); d.style.background=TH.cl[mm.n.ci]; b.appendChild(d);
      var rt=el("span","rt");
      var set=new Set(mm.m.idx), title=mm.n.title;
      var buf="";
      for(var ci2=0;ci2<title.length;ci2++){
        if(set.has(ci2)){
          if(buf){ rt.appendChild(document.createTextNode(buf)); buf=""; }
          var bb=el("b",null,title[ci2]); rt.appendChild(bb);
        } else buf+=title[ci2];
      }
      if(buf) rt.appendChild(document.createTextNode(buf));
      b.appendChild(rt);
      b.appendChild(el("span","rc",CL[mm.n.ci].name));
      b.addEventListener("mousedown",function(ev){ ev.preventDefault(); });
      b.addEventListener("click",function(){ chooseResult(mm.n); });
      results.appendChild(b);
      resItems.push({btn:b,n:mm.n});
    });
  }
  results.classList.add("open");
  q.setAttribute("aria-expanded","true");
}
function chooseResult(n){
  closeResults();
  if(tl.on) stopTL();
  exitLocal(false);
  selectNode(n,{fly:true});
  flyTo(n.x,n.y,Math.max(cam.k,1.1));
  q.blur();
}
function setActive(i){
  if(!resItems.length) return;
  if(resActive>=0) resItems[resActive].btn.classList.remove("active");
  resActive=(i+resItems.length)%resItems.length;
  resItems[resActive].btn.classList.add("active");
  resItems[resActive].btn.scrollIntoView({block:"nearest"});
}
q.addEventListener("input",renderResults);
q.addEventListener("focus",function(){ if(q.value.trim()) renderResults(); });
q.addEventListener("blur",function(){ setTimeout(closeResults,150); });
q.addEventListener("keydown",function(e){
  if(e.key==="ArrowDown"){ e.preventDefault(); setActive(resActive+1); }
  else if(e.key==="ArrowUp"){ e.preventDefault(); setActive(resActive-1); }
  else if(e.key==="Enter"){
    e.preventDefault();
    if(resActive>=0) chooseResult(resItems[resActive].n);
    else if(resItems.length) chooseResult(resItems[0].n);
  }
  else if(e.key==="Escape"){ closeResults(); q.blur(); e.stopPropagation(); }
});

/* ================= pointer interaction ================= */
var pts=new Map(), drag=null;
canvas.addEventListener("pointerdown",function(e){
  canvas.setPointerCapture(e.pointerId);
  pts.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(pts.size===2){ drag=null; dragNode=null; return; }
  camAnim=null;
  var n=hitTest(e.clientX,e.clientY);
  drag={node:n,sx:e.clientX,sy:e.clientY,cx:cam.x,cy:cam.y,moved:false};
  if(n){
    dragNode=n;
    drag.ox=n.x-toWorldX(e.clientX);
    drag.oy=n.y-toWorldY(e.clientY);
  }
  canvas.classList.add("dragging");
});
canvas.addEventListener("pointermove",function(e){
  if(pts.has(e.pointerId)&&pts.size===2){
    var ids=[...pts.keys()], a=pts.get(ids[0]), b=pts.get(ids[1]);
    var d0=Math.hypot(a.x-b.x,a.y-b.y)||1;
    var m0={x:(a.x+b.x)/2,y:(a.y+b.y)/2};
    pts.set(e.pointerId,{x:e.clientX,y:e.clientY});
    a=pts.get(ids[0]); b=pts.get(ids[1]);
    var d1=Math.hypot(a.x-b.x,a.y-b.y)||1;
    var m1={x:(a.x+b.x)/2,y:(a.y+b.y)/2};
    zoomAt(m1.x,m1.y,cam.k*d1/d0);
    cam.x-=(m1.x-m0.x)/cam.k; cam.y-=(m1.y-m0.y)/cam.k;
    return;
  }
  if(pts.has(e.pointerId)) pts.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(drag){
    if(Math.abs(e.clientX-drag.sx)+Math.abs(e.clientY-drag.sy)>4) drag.moved=true;
    if(drag.node){
      drag.node.x=toWorldX(e.clientX)+drag.ox;
      drag.node.y=toWorldY(e.clientY)+drag.oy;
      drag.node.vx=0; drag.node.vy=0;
      reheat(0.3);
    } else {
      cam.x=drag.cx-(e.clientX-drag.sx)/cam.k;
      cam.y=drag.cy-(e.clientY-drag.sy)/cam.k;
    }
    return;
  }
  var h=hitTest(e.clientX,e.clientY);
  hoverN=h;
  canvas.classList.toggle("overnode",!!h);
});
function endPointer(e){
  pts.delete(e.pointerId);
  canvas.classList.remove("dragging");
  if(drag){
    if(!drag.moved){
      if(drag.node) selectNode(drag.node);
      else clearSelection();
    }
    drag=null;
  }
  dragNode=null;
}
canvas.addEventListener("pointerup",endPointer);
canvas.addEventListener("pointercancel",endPointer);
canvas.addEventListener("pointerleave",function(){ if(!drag) hoverN=null; });

canvas.addEventListener("dblclick",function(e){
  if(tl.on) return;
  var n=hitTest(e.clientX,e.clientY);
  if(n) enterLocal(n);
  else if(localFocus) exitLocal();
});

function zoomAt(mx,my,k2){
  camAnim=null;
  k2=Math.max(0.06,Math.min(7,k2));
  var wx=(mx-W/2)/cam.k+cam.x, wy=(my-H/2)/cam.k+cam.y;
  cam.k=k2;
  cam.x=wx-(mx-W/2)/k2; cam.y=wy-(my-H/2)/k2;
}
canvas.addEventListener("wheel",function(e){
  e.preventDefault();
  var dy=e.deltaY*(e.deltaMode===1?33:1);
  zoomAt(e.clientX,e.clientY,cam.k*Math.exp(-dy*0.0016));
},{passive:false});

/* ================= keyboard ================= */
addEventListener("keydown",function(e){
  var inField=document.activeElement===q;
  if(e.key==="/"&&!inField){
    e.preventDefault(); q.focus(); q.select();
  } else if(e.key==="Escape"&&!inField){
    if(panel.classList.contains("open")) closePanel();
    else if(localFocus) exitLocal();
    else if(tl.on) stopTL();
  }
});

/* ================= main loop ================= */
// warm-up so the first paint is already a settled constellation
for(var w=0;w<280;w++) step();
alpha=0.06;
(function initialFit(){
  var x0=1e9,y0=1e9,x1=-1e9,y1=-1e9;
  notes.forEach(function(n){ x0=Math.min(x0,n.x); y0=Math.min(y0,n.y); x1=Math.max(x1,n.x); y1=Math.max(y1,n.y); });
  cam.x=(x0+x1)/2; cam.y=(y0+y1)/2;
  cam.k=Math.max(0.08,Math.min(1.2,Math.min((W-160)/(x1-x0),(H-180)/(y1-y0))));
})();

var lastT=performance.now();
function frame(now){
  var dt=Math.min(64,now-lastT); lastT=now;
  if(tl.on) tlFrame(dt);
  step();
  var lerp=RM()?1:0.14;
  for(var i=0;i<notes.length;i++){
    var n=notes[i];
    if(n.visA!==n.visT){
      n.visA+=(n.visT-n.visA)*lerp;
      if(Math.abs(n.visA-n.visT)<0.01) n.visA=n.visT;
    }
  }
  tickCam(now);
  draw();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
})();
</script>
